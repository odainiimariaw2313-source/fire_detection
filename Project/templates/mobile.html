<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fire Detection - Home</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/mobile.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="mobile-container">
        <!-- Header -->
        <div class="mobile-header">
            <div class="status-icons">
                <span class="signal-icon">📶</span>
                <span class="time" id="current-time">9:41</span>
                <span class="battery-icon">🔋</span>
            </div>
        </div>

        <!-- Main Risk Card -->
        <div class="risk-card" id="risk-card">
            <h2 class="card-title">Overview</h2>
            
            <div class="percentage-circle">
                <div class="circle-inner">
                    <span class="percentage" id="risk-percentage">{{ fire_risk.percentage }}%</span>
                </div>
            </div>

            <p class="risk-label" id="risk-label">{{ fire_risk.label }}</p>

            <div class="weather-stats">
                <div class="stat">
                    <span class="stat-icon">🌡️</span>
                    <span class="stat-value" id="temp-value">{{ weather.temperature }}°C</span>
                    <span class="stat-label">Temperature</span>
                </div>
                <div class="stat">
                    <span class="stat-icon">💧</span>
                    <span class="stat-value" id="humidity-value">{{ weather.humidity }}%</span>
                    <span class="stat-label">Humidity</span>
                </div>
                <div class="stat">
                    <span class="stat-icon">💨</span>
                    <span class="stat-value" id="wind-value">{{ weather.wind_speed }} km/h</span>
                    <span class="stat-label">Wind Speed</span>
                </div>
            </div>

            <p class="risk-description" id="risk-description">
                {{ fire_risk.description }}
            </p>
        </div>

        <!-- Footer Navigation -->
        <nav class="bottom-nav">
            <a href="/mobile" class="nav-item active"><i class="fas fa-home"></i><span>Home</span></a>
            <a href="/cameras" class="nav-item"><i class="fas fa-video"></i><span>Cameras</span></a>
            <a href="/info" class="nav-item"><i class="fas fa-info-circle"></i><span>Info</span></a>
            <a href="/stats" class="nav-item"><i class="fas fa-chart-line"></i><span>Stats</span></a>
        </nav>
    </div>

    <script>
        // Set initial card color
        document.getElementById('risk-card').style.background = '{{ fire_risk.color }}';
    </script>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='js/mobile.js') }}"></script>
</body>
</html>
